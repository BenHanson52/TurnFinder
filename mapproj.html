<!-- FRONTEND CODE (mapproj.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO Summer Skiing</title>
  
  <!-- The link to leaflet's style sheet, the library that I'm using to render my map -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="mapstyles.css">
  <!-- Adding the browser-image-compression library so I can compress images on the front end
       and avoid having to deal with that stuff on my backend -->
  <script src="https://unpkg.com/browser-image-compression/dist/browser-image-compression.js"></script>
  
</head>
<body>
  <header>
    <h4 id="header_title">Summertime Skiing in Colorado</h4>
    <!-- admin Panel button (only visible if the user is admin) -->
    <button id="adminPanelBtn" class="hidden">Admin Panel</button>
  </header>
  <p id="tagline_text">A user-driven off-season snow conditions reporting site</p>
  <div id="map"></div>
  <main>
    <footer>
      <!-- footer -->
      <p>Email: summertimeskiingco@gmail.com</p>
      <p>Powered by Leaflet, Esri, and OpenStreetMap</p>
    </footer>
  </main>

  <!-- admin panel modal, hidden by default.. do i want this visible here? -->
  <div id="adminPanelModal" class="hidden">
    <div class="modal-content">
      <h2>Admin Panel - Users</h2>
      <button id="closeAdminPanel">Close</button>
      <table id="usersTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Template for the pin form -->
  <template id="pinFormTemplate">
    <form id="pinForm" enctype="multipart/form-data">
      <label for="name">What'd you ski?</label>
      <input type="text" id="name" name="name" required>
      
      <label for="description">How were the conditions out there?</label>
      <textarea id="description" name="description"></textarea>
      
      <label for="image" >Upload Image:</label>
      <input type="file" id="image" name="image" accept="image/*" multiple>
      
      <!-- Hidden inputs for lat/lng as leaflet pulls that data when the user creates a pin -->
      <input type="hidden" id="lat" name="lat">
      <input type="hidden" id="lng" name="lng">
      
      <button id="submitbtn" type="button">Submit Pin</button>
    </form>
  </template>

  <!-- Login modal -->
  <div id="loginModal" class="hidden">
    <div class="modal-content">
      <h2 id="formTitle">Please Log In</h2>
      <form id="loginForm">
        <div class="login-fields">
          <!-- Login fields (always visible) -->
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>

          <br>
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="registration-fields hidden">
          <!-- registration-specific fields (hidden by default) -->
          <label for="new_username">New Username:</label>
          <input type="text" id="new_username" name="new_username" placeholder="Enter new username...">

          <br>
          <label for="new_password">New Password:</label>
          <input type="password" id="new_password" name="new_password" placeholder="Enter new password...">
        </div>
        <div>
          <!-- ghe submit button text will change based on mode -->
          <button type="submit" id="submitBtn">Login</button>
          <!-- toggle button to switch between Login and Create Account mode -->
          <button type="button" id="toggleBtn">Create Account</button>
        </div>
      </form>
    </div>
  </div>

  <!-- a link to Leaflet's JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <!-- a link to Esri's Leaflet JS that allows me to have a control panel to 
       let users select what layers they want to say-->
  <script src="https://unpkg.com/esri-leaflet"></script>

  <script src="mapproj_script.js" type="module"></script>

  <!-- Leaflet Control Geocoder -->
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
  />
  <script
  src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js">
  </script>
</body>
</html>
